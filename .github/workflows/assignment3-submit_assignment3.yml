name: Build and deploy Nuxt (Node) app to Azure Web App - assignment3

on:
  push:
    branches:
      - assignment3-submit
    paths:
      - "assignment3/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: assignment3-webapp
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: assignment3/package-lock.json

      - name: Install dependencies
        working-directory: assignment3
        run: npm ci

      - name: Build Nuxt
        working-directory: assignment3
        run: npm run build

      # Keep only production deps for runtime
      - name: Prune dev dependencies
        working-directory: assignment3
        run: npm prune --omit=dev

      # Package a clean deploy artifact
      - name: Create deploy zip
        working-directory: assignment3
        run: |
          rm -f nuxt-app.zip
          zip -r nuxt-app.zip .output node_modules package.json package-lock.json

      - name: Upload artifact (Nuxt runtime zip)
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-app
          path: assignment3/nuxt-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nuxt-app
          path: assignment3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_63BC91CA6FA144B2BFD665D9133D3541 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CA280A0C7A8A4C03A3DFD2049E5635B2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7B7A34467D324A8BBB54C354B8EA5080 }}

      # Turn off Oryx build on App Service (we already built in GitHub Actions)
      - name: Disable build during deploy (Oryx)
        run: |
          az webapp config appsettings set \
            --resource-group cscd445-a2 \
            --name assignment3 \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=1

      - name: Deploy to Azure Web App (ZIP)
        uses: azure/webapps-deploy@v3
        with:
          app-name: assignment3
          slot-name: Production
          package: assignment3/nuxt-app.zip
          # Critical for Nuxt on Linux App Service:
          startup-command: "node .output/server/index.mjs"

      - name: Restart web app (ensure new package is live)
        run: |
          az webapp restart --resource-group cscd445-a2 --name assignment3
