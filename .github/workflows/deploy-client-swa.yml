name: Deploy Client (Azure Static Web App)

on:
  push:
    branches: [ assignment3-submit ]
    paths:
      - "assignment3/**"
      - ".github/workflows/deploy-client-swa.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: assignment3/package-lock.json

      - name: Install
        working-directory: assignment3
        run: npm ci

      # ✅ Run Vitest tests (they can live in assignment3/tests and/or anywhere configured by vitest)
      # This assumes your package.json has "test": "vitest"
      - name: Test
        working-directory: assignment3
        run: npm test -- --run

      - name: Generate
        working-directory: assignment3
        env:
          NUXT_PUBLIC_API_BASE: https://assignment3-b6dfeygfb0bgfgbr.eastus2-01.azurewebsites.net
        run: npm run generate

      - name: Verify static output exists
        run: |
          ls -la assignment3/.output/public
          test -f assignment3/.output/public/index.html

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_FOREST_00C371E0F }}
          action: upload

          # ✅ IMPORTANT: point SWA directly at the folder that contains index.html
          app_location: "assignment3/.output/public"

          # ✅ we're already built
          skip_app_build: true
          skip_api_build: true
