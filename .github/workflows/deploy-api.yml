name: Deploy API (Azure App Service)

on:
  push:
    branches: [ assignment3-submit ]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build_publish_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        working-directory: api
        run: dotnet restore Assignment3.Api/Assignment3.Api.csproj

      - name: Build
        working-directory: api
        run: dotnet build Assignment3.Api/Assignment3.Api.csproj -c Release --no-restore

      - name: Publish
        working-directory: api
        run: dotnet publish Assignment3.Api/Assignment3.Api.csproj -c Release -o ../publish --no-build

      - name: Verify publish output
        run: |
          ls -la publish | head -50
          test -f publish/Assignment3.Api.dll

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../publish.zip .

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: assignment3
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish.zip
