name: Deploy API (Azure App Service)

on:
  push:
    branches: [ assignment3-submit ]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build_publish_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ----------------------------
      # Build + Test (from repo root)
      # Tests live in api/Assignment3.Api.Tests next to api/Assignment3.Api
      # ----------------------------

      - name: Restore (API + Tests)
        run: dotnet restore api/Assignment3.Api.Tests/Assignment3.Api.Tests.csproj

      - name: Build (API + Tests)
        run: dotnet build api/Assignment3.Api.Tests/Assignment3.Api.Tests.csproj -c Release --no-restore

      - name: Test (API + Integration)
        run: dotnet test api/Assignment3.Api.Tests/Assignment3.Api.Tests.csproj -c Release --no-build --verbosity normal

      # ----------------------------
      # Publish API (only after tests pass)
      # ----------------------------

      - name: Publish
        working-directory: api
        run: dotnet publish Assignment3.Api/Assignment3.Api.csproj -c Release -o ../publish --no-build

      - name: Verify publish output
        run: |
          ls -la publish | head -50
          test -f publish/Assignment3.Api.dll

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../publish.zip .

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: assignment3
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish.zip
        ##Here we go!!!
