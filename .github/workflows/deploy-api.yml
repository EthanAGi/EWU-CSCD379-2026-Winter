name: Deploy API (App Service)

on:
  push:
    branches: [ "Assignment4" ]
    paths:
      - "assignment4/backend/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "assignment4/backend/MortuaryAssistant.Api/MortuaryAssistant.Api.csproj"
  PUBLISH_DIR: "publish"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" -c Release --no-restore

      - name: Run unit tests
        run: dotnet test "assignment4/backend/MortuaryAssistant.Api.Tests/MortuaryAssistant.Api.Tests.csproj" --no-build --verbosity minimal

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -o "${{ env.PUBLISH_DIR }}" --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "mortuaryassist-api"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "${{ env.PUBLISH_DIR }}"