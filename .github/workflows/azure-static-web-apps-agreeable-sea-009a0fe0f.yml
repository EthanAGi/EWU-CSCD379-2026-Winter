name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - Assignment4
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - Assignment4

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_SEA_009A0FE0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload

          # Nuxt app root (where package.json is)
          app_location: "assignment4/frontend/mortuary-frontend"

          # IMPORTANT: do NOT set api_location unless you're deploying Azure Functions
          # api_location: ""

          # For Nuxt static output
          output_location: ".output/public"

          # Force static generation so index.html exists
          app_build_command: "npm ci && npm run generate"